worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # Rootfs read-only: todos os caminhos temporários precisam ficar em /tmp (tmpfs)
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    # Logs direto para a saída do container
    access_log /dev/stdout;
    error_log  /dev/stderr;

    # Uploads no editor do n8n (importação de workflows, arquivos binários)
    client_max_body_size 50m;

    # WebSocket / SSE: define o header Connection conforme o Upgrade do cliente.
    # Mantém keep-alive ("close" vazio) em requisições normais e faz upgrade só
    # quando o cliente pede (push do editor do n8n).
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Redirect HTTP → HTTPS
    server {
        listen 80;
        server_name n8n.edglobo.com.br;
        return 301 https://$host$request_uri;
    }

    # HTTPS → n8n
    server {
        listen 443 ssl;
        http2 on;
        server_name n8n.edglobo.com.br;

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Headers de segurança
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        location / {
            proxy_pass http://n8n:5678;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host  $host;
            # n8n confia neste header (N8N_PROXY_HOPS=1) para montar URLs https
            proxy_set_header X-Forwarded-Proto https;

            # WebSocket / push do editor do n8n
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Execuções longas e streaming (SSE) não devem ser cortados nem bufferizados
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering    off;
        }
    }
}
