services:
  n8n:
    image: n8nio/n8n:2.27.0-amd64
    user: "1000:1000"
    restart: unless-stopped
    env_file:
      - n8n.env
    volumes:
      - ./n8n-data:/home/node/.n8n
    networks:
      - n8n-net
    expose:
      - "5678"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /home/node/.cache
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:5678/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.15.3-amd64
    user: "65534:65534"
    restart: unless-stopped
    command:
      - --http-address=0.0.0.0:4180
      - --upstream=http://n8n:5678
      - --provider=oidc
      - --oidc-issuer-url=https://login.microsoftonline.com/${AZURE_TENANT_ID}/v2.0
      - --client-id=${AZURE_CLIENT_ID}
      - --client-secret=${AZURE_CLIENT_SECRET}
      - --cookie-secret=${OAUTH2_COOKIE_SECRET}
      - --cookie-secure=true
      - --cookie-httponly=true
      - --cookie-expire=8h
      - --cookie-refresh=1h
      - --email-domain=*
      - --allowed-group=${AZURE_ALLOWED_GROUP_IDS}
      - --oidc-groups-claim=groups
      - --oidc-email-claim=preferred_username
      - --scope=openid profile email
      - --redirect-url=https://${N8N_HOST}/oauth2/callback
      - --skip-provider-button=true
      - --pass-access-token=true
      - --pass-user-headers=true
      - --set-xauthrequest=true
      - --reverse-proxy=true
    networks:
      - n8n-net
    expose:
      - "4180"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    depends_on:
      - n8n
  nginx:
    image: nginx:1.31.1-trixie-perl
    user: "101:101"
    restart: unless-stopped
    ports:
      - "80:8080"
      - "443:8443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - n8n-net
    depends_on:
      - oauth2-proxy
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
networks:
  n8n-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.16.1.0/24
