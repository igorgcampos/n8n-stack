services:
  postgres:
    image: postgres:18.4-trixie
    user: "999:999"
    restart: unless-stopped
    environment:
      POSTGRES_DB: n8n
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - ./postgres-data:/var/lib/postgresql
    networks:
      - n8n-net
    ports:
      # Exposto para o worker do GCP acessar via VPN/Interconnect
      - "5432:5432"
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n -d n8n"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.6.4-trixie
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --bind 0.0.0.0
    volumes:
      - ./redis-data:/data
    networks:
      - n8n-net
    ports:
      # Exposto para o worker do GCP acessar via Interconnect/VPN
      - "6379:6379"
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  n8n:
    image: n8nio/n8n:2.26.7-amd64
    user: "1000:1000"
    restart: unless-stopped
    env_file:
      - n8n.env
    volumes:
      - ./n8n-data:/home/node/.n8n
    networks:
      - n8n-net
    expose:
      - "5678"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /home/node/.cache
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:5678/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5

  n8n-worker:
    image: n8nio/n8n:2.26.7-amd64
    user: "1000:1000"
    restart: unless-stopped
    command: worker
    env_file:
      - n8n.env
    volumes:
      - ./n8n-data:/home/node/.n8n
    networks:
      - n8n-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /home/node/.cache

  nginx:
    image: nginx:trixie-perl
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - n8n-net
    depends_on:
      n8n:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /run

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt

networks:
  n8n-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.16.1.0/24
